<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PromptGuard Admin | Crypto Audit Scanner</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #ccc; font-family: monospace; }
        button { background: #5a28cc; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; background: #ccc; margin-right: 5px; }
        .healthy { background: #28a745; }
    </style>
</head>
<body>
    <h2>PromptGuard Notarization</h2>
    <p style="margin-bottom:16px;"><a href="marketing.html" style="color:#5a28cc;font-size:14px;">&#8592; Back to Marketing Page</a></p>
    <div id="health"><span class="status-dot" id="dot"></span> <span id="text">Checking system...</span></div>
    
    <p>Sign with WebAuth (<strong>ubitquity1</strong>)</p>
    <textarea id="pInput" rows="8" placeholder="Paste Golden Prompt..."></textarea>
    
    <select id="tSelect">
        <option value="CAUDIT">CAUDIT</option>
        <option value="TLENS">TLENS</option>
    </select>
    <button onclick="sign()">Sign & Anchor</button>
    <p id="msg"></p>

    <script type="module">
        import { SessionKit } from 'https://esm.sh/@wharfkit/session@1.2.2';
        import { WebRenderer } from 'https://esm.sh/@wharfkit/web-renderer@1.0.8';
        import { WalletPluginWebAuth } from 'https://esm.sh/@proton/wharfkit-plugin-webauth@1.1.0';

        const kit = new SessionKit({
            appName: "PromptGuard",
            networks: [{ chainId: "78453230383134303334363431333332", nodeUrl: "https://proton.greymass.com" }],
            ui: new WebRenderer(),
            walletPlugins: [new WalletPluginWebAuth()]
        });

        window.sign = async () => {
            const prompt = document.getElementById('pInput').value;
            const token = document.getElementById('tSelect').value;
            const msg = document.getElementById('msg');
            
            const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(prompt));
            const hash = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

            try {
                const { session } = await kit.login();
                const result = await session.transact({ action: {
                    account: "tokencreate", name: "transfer", authorization: [session.permissionLevel],
                    data: { from: session.actor, to: "burn.xpr", quantity: `1.00000000 ${token}`, memo: `REPORT:${hash}:CLEAN_PROMPT` }
                }});

                await fetch('/api/verify', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ account: session.actor.toString(), hash, txid: result.response.transaction_id, token })
                });
                msg.innerHTML = "✅ Successfully Notarized!";
            } catch (e) { msg.innerText = "❌ Error: " + e.message; }
        };

        const check = async () => {
            const res = await fetch('/api/health').then(r => r.json());
            document.getElementById('dot').className = 'status-dot ' + (res.status === 'healthy' ? 'healthy' : '');
            document.getElementById('text').innerText = `System ${res.status} (${res.prompts} Prompts)`;
        };
        check();
    </script>
</body>
</html>
